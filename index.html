<!DOCTYPE html>
<html lang="pt-BR">
<head>

  <meta charset="UTF-8">

  <meta
  name="viewport"
  content="width=device-width, initial-scale=1.0">

  <title>FinancePro</title>

  <link rel="stylesheet" href="style.css">

  <link rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>
<body>

  <!-- LOGIN -->

  <div id="loginTela">

    <div class="login-box">

      <h1>FinancePro</h1>

      <input
      type="email"
      id="email"
      placeholder="Email">

      <input
      type="password"
      id="senha"
      placeholder="Senha">

      <button onclick="registrar()">
        Criar Conta
      </button>

      <button onclick="login()">
        Entrar
      </button>

    </div>

  </div>

  <!-- SIDEBAR -->

  <aside class="sidebar">

    <div>

      <h2 class="logo">

        <i class="fa-solid fa-chart-line"></i>

        FinancePro

      </h2>

      <button id="toggleTema">

        <i class="fa-solid fa-moon"></i>

        Tema

      </button>

      <!-- PERFIL -->

      <div class="perfil-box">

        <label for="inputFoto" class="foto">

          <img
          id="fotoPerfil"
</html>
