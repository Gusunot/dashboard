<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Finance Dashboard</title>

<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<aside class="sidebar">

  <div>

    <h2 class="logo">FinancePro</h2>

    <button id="temaBtn">Tema</button>

    <div class="perfil">
      <label>
        <img id="fotoPerfil" src="https://i.imgur.com/2DhmtJ4.png">
        <input type="file" id="fotoInput" hidden>
      </label>

      <input id="nome" placeholder="Digite seu nome aqui">
    </div>

    <div class="meses" id="meses"></div>

    <button onclick="exportar()">Exportar</button>
    <button onclick="document.getElementById('importar').click()">Importar</button>
    <input type="file" id="importar" hidden>

  </div>

  <footer>gusta_ig</footer>

</aside>

<main class="main">

<h1 id="titulo"></h1>

<div class="cards">

  <div class="card"><p>Receitas</p><h2 id="receitas">0</h2></div>
  <div class="card"><p>Despesas</p><h2 id="despesas">0</h2></div>
  <div class="card"><p>Saldo</p><h2 id="saldo">0</h2></div>
  <div class="card"><p>Qtd</p><h2 id="qtd">0</h2></div>

</div>

<div class="form">

<input id="desc" placeholder="Descrição">
<input id="valor" type="number" placeholder="Valor">

<select id="tipo">
<option value="entrada">Entrada</option>
<option value="saida">Saída</option>
</select>

<select id="cat">
<option>Alimentação</option>
<option>Transporte</option>
<option>Outros</option>
</select>

<button onclick="add()">Adicionar</button>

</div>

<div class="graficos">

<canvas id="pizza"></canvas>
<canvas id="linha"></canvas>

</div>

<table>

<thead>
<tr>
<th>Desc</th>
<th>Cat</th>
<th>Tipo</th>
<th>Valor</th>
<th>Ação</th>
</tr>
</thead>

<tbody id="table"></tbody>

</table>

</main>

<script src="script.js"></script>

</body>
</html>
