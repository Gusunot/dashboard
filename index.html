<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Finance Dashboard Pro</title>

  <link rel="stylesheet" href="style.css">

  <link rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<aside class="sidebar">

  <div>

    <h2 class="logo">
      <i class="fa-solid fa-chart-line"></i>
      FinancePro
    </h2>

    <button id="toggleTema">Tema</button>

    <div class="perfil-box">

      <label class="foto">
        <img id="fotoPerfil" src="https://i.imgur.com/2DhmtJ4.png">
        <input type="file" id="inputFoto" hidden>
      </label>

      <input id="nomeUsuario" placeholder="Digite seu nome aqui">
    </div>

    <div class="ano-box">
      <button onclick="trocarAno(-1)">◀</button>
      <h3 id="anoAtual"></h3>
      <button onclick="trocarAno(1)">▶</button>
    </div>

    <div class="meses" id="listaMeses"></div>

    <div class="backup-box">
      <button onclick="exportarDados()">Exportar</button>
      <input type="file" id="importFile" hidden>
      <button onclick="document.getElementById('importFile').click()">Importar</button>
    </div>

  </div>

  <footer class="footer-sidebar">
    <strong>gusta_ig</strong>
  </footer>

</aside>

<main class="conteudo">

<header class="topo">
  <h1 id="tituloMes"></h1>
  <p>Controle financeiro inteligente</p>
</header>

<section class="cards">

  <div class="card"><span>Receitas</span><h2 id="receitas">R$ 0</h2></div>
  <div class="card"><span>Despesas</span><h2 id="despesas">R$ 0</h2></div>
  <div class="card"><span>Saldo</span><h2 id="saldo">R$ 0</h2></div>
  <div class="card"><span>Transações</span><h2 id="quantidade">0</h2></div>

  <div class="card extra">
    <span>Maior gasto</span>
    <h2 id="maiorGasto">R$ 0</h2>
  </div>

</section>

<section class="filtros">

  <input id="pesquisa" placeholder="Buscar descrição ou valor">

  <select id="filtroCategoria">
    <option value="todos">Todas</option>
    <option>Alimentação</option>
    <option>Transporte</option>
    <option>Salário</option>
    <option>Lazer</option>
    <option>Estudos</option>
    <option>Igreja</option>
    <option>Outros</option>
  </select>

</section>

<section class="formulario">

  <input id="descricao" placeholder="Descrição">
  <input id="valor" type="number" placeholder="Valor">

  <select id="tipo">
    <option value="entrada">Receita</option>
    <option value="saida">Despesa</option>
  </select>

  <select id="categoria">
    <option>Alimentação</option>
    <option>Transporte</option>
    <option>Salário</option>
    <option>Lazer</option>
    <option>Estudos</option>
    <option>Igreja</option>
    <option>Outros</option>
  </select>

  <button onclick="adicionarTransacao()">Adicionar</button>

</section>

<section class="graficos">
  <div class="grafico-card"><canvas id="graficoPizza"></canvas></div>
  <div class="grafico-card"><canvas id="graficoLinha"></canvas></div>
</section>

<section class="tabela-box">
  <table>
    <thead>
      <tr>
        <th>Descrição</th>
        <th>Categoria</th>
        <th>Tipo</th>
        <th>Valor</th>
        <th>Ações</th>
      </tr>
    </thead>
    <tbody id="tabela"></tbody>
  </table>
</section>

</main>

<div id="toast"></div>

<script src="script.js"></script>

</body>
</html>
